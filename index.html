<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FlashMaster">
<meta name="theme-color" content="#f5f6fa">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>FlashMaster</title>
<style>
:root{--bg:#f5f6fa;--panel:#fff;--text:#171923;--muted:#677084;--line:#d9deea;--blue:#1c5cbc;--blue2:#eaf1ff;--red:#dc2626;--green:#12805c;--orange:#b45309;--shadow:0 8px 30px rgba(20,30,50,.08)}
.dark{--bg:#111827;--panel:#172033;--text:#f3f4f6;--muted:#a8b1c3;--line:#2b3850;--blue:#7aa7ff;--blue2:#1d2a44;--shadow:0 8px 30px rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input,textarea,select{font:inherit}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:9px;padding:10px 13px;cursor:pointer}button.primary{background:var(--blue);border-color:var(--blue);color:white}button.good{background:var(--green);border-color:var(--green);color:white}button.warn{background:var(--orange);border-color:var(--orange);color:white}button.bad{background:var(--red);border-color:var(--red);color:white}button.ghost{background:transparent}.app{min-height:100vh}.top{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}.brand{font-weight:700;font-size:21px}.brand span{color:var(--blue)}.layout{display:grid;grid-template-columns:250px 1fr;gap:18px;padding:18px;max-width:1200px;margin:0 auto}.side,.main,.card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:14px}.side{padding:14px;height:max-content}.main{padding:18px;min-height:70vh}.nav button{display:block;width:100%;text-align:left;margin:6px 0}.nav button.active{background:var(--blue2);border-color:var(--blue);color:var(--blue)}.small{font-size:13px;color:var(--muted)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{justify-content:space-between}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.stat{padding:14px;border:1px solid var(--line);border-radius:12px}.big{font-size:30px;font-weight:700}.deck{padding:16px;border:1px solid var(--line);border-radius:12px;margin:10px 0}.deck h3{margin:0 0 7px}.deck:hover{border-color:var(--blue)}.study-card{max-width:720px;margin:25px auto;padding:32px;text-align:center;border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:var(--shadow);min-height:260px;display:flex;flex-direction:column;justify-content:center}.prompt{font-size:28px;line-height:1.35;white-space:pre-wrap}.answer{font-size:23px;color:var(--muted);border-top:1px solid var(--line);padding-top:22px;margin-top:22px;white-space:pre-wrap}.ease{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:720px;margin:0 auto}.form{display:grid;gap:12px;max-width:760px}.form input,.form textarea,.form select,.search{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text)}.form textarea{min-height:110px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px;color:var(--muted)}.empty{text-align:center;padding:45px;color:var(--muted)}@media(max-width:800px){.layout{display:block;padding:10px}.side{margin-bottom:10px}.top{padding:0 10px}.ease{grid-template-columns:1fr 1fr}.prompt{font-size:23px}.main{padding:12px}.table{font-size:13px}.hide-mobile{display:none}} 
</style>
</head>
<body><div id="app"></div>
<script>
const STORE='flashmaster-pwa-v1';
const now=()=>Date.now();
const day=86400000;
const seed={dark:false,view:'decks',activeDeck:'d1',showAnswer:false,query:'',draft:null,decks:[{id:'d1',name:'Japanese Core',desc:'Vocabulary and recognition practice'},{id:'d2',name:'Civil Engineering',desc:'Work terms and review notes'}],cards:[
{id:'c1',deckId:'d1',front:'制治',back:'Likely a mistaken form. 制 = control/system; 治 = govern/cure. Often confused with 政治.',due:now()-1000,interval:0,ease:2.5,reps:0,lapses:0,state:'new'},
{id:'c2',deckId:'d1',front:'投げ銭',back:'A tip or donation, especially online creator tipping.',due:now()+day,interval:1,ease:2.5,reps:1,lapses:0,state:'review'},
{id:'c3',deckId:'d2',front:'ITS',back:'Intelligent Transportation Systems: signals, detection, communications, traffic operations technology.',due:now()-5000,interval:0,ease:2.5,reps:0,lapses:0,state:'new'}]};
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(STORE))||seed}catch(e){return seed}}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function dueCards(deckId){return state.cards.filter(c=>c.deckId===deckId && c.due<=now())}
function deckStats(id){let cards=state.cards.filter(c=>c.deckId===id);return{total:cards.length,due:cards.filter(c=>c.due<=now()).length,new:cards.filter(c=>c.state==='new').length,learn:cards.filter(c=>c.state==='learning').length,review:cards.filter(c=>c.state==='review').length}}
function set(p){Object.assign(state,p);save();render()}
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function currentDeck(){return state.decks.find(d=>d.id===state.activeDeck)||state.decks[0]}
function currentCard(){return dueCards(state.activeDeck)[0]}
function review(rating){let c=currentCard(); if(!c)return; c.reps++; if(rating==='again'){c.lapses++;c.interval=0;c.state='learning';c.due=now()+10*60*1000}else if(rating==='hard'){c.interval=Math.max(1,Math.round((c.interval||1)*1.2));c.ease=Math.max(1.3,c.ease-.15);c.state='review';c.due=now()+c.interval*day}else if(rating==='good'){c.interval=c.interval?Math.round(c.interval*c.ease):1;c.state='review';c.due=now()+c.interval*day}else{c.interval=c.interval?Math.round(c.interval*(c.ease+.4)):4;c.ease+=.15;c.state='review';c.due=now()+c.interval*day} state.showAnswer=false; save(); render()}
function addCard(e){e.preventDefault();let f=e.target;state.cards.unshift({id:crypto.randomUUID(),deckId:f.deck.value,front:f.front.value,back:f.back.value,due:now(),interval:0,ease:2.5,reps:0,lapses:0,state:'new'});save();set({view:'browse'})}
function addDeck(){let name=prompt('Deck name'); if(!name)return; let id=crypto.randomUUID(); state.decks.push({id,name,desc:''}); state.activeDeck=id; save();render()}
function delCard(id){if(confirm('Delete this card?')){state.cards=state.cards.filter(c=>c.id!==id);save();render()}}
function exportData(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='flashmaster-backup.json';a.click()}
function importData(inp){let file=inp.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render()}catch(e){alert('Could not import file')}};r.readAsText(file)}
function render(){document.documentElement.className=state.dark?'dark':'';let deck=currentDeck(); let totals={cards:state.cards.length,due:state.cards.filter(c=>c.due<=now()).length,decks:state.decks.length};document.getElementById('app').innerHTML=`<div class="app"><div class="top"><div class="brand">Flash<span>Master</span></div><div class="row"><button onclick="set({dark:!state.dark})">${state.dark?'Light':'Dark'}</button></div></div><div class="layout"><aside class="side"><div class="small">Deck</div><select class="search" onchange="set({activeDeck:this.value,showAnswer:false})">${state.decks.map(d=>`<option value="${d.id}" ${d.id===state.activeDeck?'selected':''}>${esc(d.name)}</option>`).join('')}</select><div class="nav"><button class="${state.view==='decks'?'active':''}" onclick="set({view:'decks'})">Decks</button><button class="${state.view==='study'?'active':''}" onclick="set({view:'study',showAnswer:false})">Study</button><button class="${state.view==='add'?'active':''}" onclick="set({view:'add'})">Add</button><button class="${state.view==='browse'?'active':''}" onclick="set({view:'browse'})">Browse</button><button class="${state.view==='stats'?'active':''}" onclick="set({view:'stats'})">Stats / Sync</button></div><p class="small">Shortcut: space shows answer. 1 Again, 2 Hard, 3 Good, 4 Easy.</p></aside><main class="main">${view()}</main></div></div>`}
function view(){if(state.view==='decks')return `<div class="row between"><h2>Decks</h2><button class="primary" onclick="addDeck()">New Deck</button></div><div class="grid"><div class="stat"><div class="big">${totalsHTML('due')}</div><div class="small">Due now</div></div><div class="stat"><div class="big">${state.cards.length}</div><div class="small">Cards</div></div><div class="stat"><div class="big">${state.decks.length}</div><div class="small">Decks</div></div></div>${state.decks.map(d=>{let s=deckStats(d.id);return `<div class="deck" onclick="set({activeDeck:'${d.id}',view:'study',showAnswer:false})"><h3>${esc(d.name)}</h3><div class="small">${esc(d.desc||'No description')}</div><p><span class="pill">${s.due} due</span> <span class="pill">${s.new} new</span> <span class="pill">${s.review} review</span> <span class="pill">${s.total} total</span></p></div>`}).join('')}`;
if(state.view==='study'){let c=currentCard(); if(!c)return `<div class="empty"><h2>No cards due in ${esc(currentDeck().name)}</h2><p>Add cards or study another deck.</p><button class="primary" onclick="set({view:'add'})">Add Card</button></div>`;return `<div class="row between"><h2>${esc(currentDeck().name)}</h2><span class="pill">${dueCards(state.activeDeck).length} due</span></div><div class="study-card"><div class="prompt">${esc(c.front)}</div>${state.showAnswer?`<div class="answer">${esc(c.back)}</div>`:''}</div>${!state.showAnswer?`<p style="text-align:center"><button class="primary" onclick="set({showAnswer:true})">Show Answer</button></p>`:`<div class="ease"><button class="bad" onclick="review('again')">Again<br><small>10 min</small></button><button class="warn" onclick="review('hard')">Hard<br><small>1 day</small></button><button class="good" onclick="review('good')">Good<br><small>${Math.max(1,c.interval||1)} day</small></button><button class="primary" onclick="review('easy')">Easy<br><small>${Math.max(4,(c.interval||1)*4)} days</small></button></div>`}`}
if(state.view==='add')return `<h2>Add Card</h2><form class="form" onsubmit="addCard(event)"><label>Deck<select name="deck">${state.decks.map(d=>`<option value="${d.id}" ${d.id===state.activeDeck?'selected':''}>${esc(d.name)}</option>`).join('')}</select></label><label>Front<textarea name="front" required></textarea></label><label>Back<textarea name="back" required></textarea></label><button class="primary">Add Card</button></form>`;
if(state.view==='browse'){let q=(state.query||'').toLowerCase();let cards=state.cards.filter(c=>(c.front+' '+c.back).toLowerCase().includes(q));return `<div class="row between"><h2>Browse</h2><button onclick="set({view:'add'})">Add</button></div><input class="search" placeholder="Search cards" value="${esc(state.query)}" oninput="set({query:this.value})"><table class="table"><thead><tr><th>Front</th><th>Back</th><th class="hide-mobile">Deck</th><th></th></tr></thead><tbody>${cards.map(c=>`<tr><td>${esc(c.front)}</td><td>${esc(c.back)}</td><td class="hide-mobile">${esc((state.decks.find(d=>d.id===c.deckId)||{}).name)}</td><td><button onclick="delCard('${c.id}')">Delete</button></td></tr>`).join('')}</tbody></table>`}
return `<h2>Stats / Sync</h2><div class="grid"><div class="stat"><div class="big">${state.cards.length}</div><div class="small">Total cards</div></div><div class="stat"><div class="big">${state.cards.reduce((a,c)=>a+c.reps,0)}</div><div class="small">Reviews done</div></div><div class="stat"><div class="big">${state.cards.filter(c=>c.due<=now()).length}</div><div class="small">Due now</div></div></div><h3>Backup</h3><p class="small">This saves data in this browser. Export a backup before clearing Safari data.</p><button onclick="exportData()">Export JSON</button> <label><button onclick="document.getElementById('imp').click()">Import JSON</button><input id="imp" type="file" accept="application/json" style="display:none" onchange="importData(this)"></label>`}
function totalsHTML(k){return state.cards.filter(c=>c.due<=now()).length}
window.addEventListener('keydown',e=>{if(state.view!=='study')return;if(e.code==='Space'){e.preventDefault(); if(!state.showAnswer)set({showAnswer:true})} if(state.showAnswer&&['Digit1','Digit2','Digit3','Digit4'].includes(e.code)){review(['again','hard','good','easy'][Number(e.code.at(-1))-1])}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}))}
render();
</script></body></html>
