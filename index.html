<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Memoki">
<meta name="theme-color" content="#f4f5f8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Memoki</title>
<style>
:root{
  --bg:#f4f5f8;--panel:#ffffff;--panel2:#f8f9fc;--text:#1b1f2a;--muted:#667085;--line:#d9dfeb;
  --blue:#1f5fbf;--blue2:#eaf2ff;--red:#c24130;--green:#167a55;--orange:#b45f06;--purple:#6953d3;
  --shadow:0 10px 32px rgba(18,28,45,.08);--radius:15px;
}
.dark{
  --bg:#101621;--panel:#172033;--panel2:#111a2a;--text:#f1f5f9;--muted:#a6b0c3;--line:#2b3850;
  --blue:#80aaff;--blue2:#1d2d4a;--red:#f87171;--green:#34d399;--orange:#fbbf24;--purple:#a78bfa;
  --shadow:0 10px 32px rgba(0,0,0,.32);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:15px}
button,input,textarea,select{font:inherit}
button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:10px;padding:10px 13px;cursor:pointer;touch-action:manipulation}
button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
button.good{background:var(--green);border-color:var(--green);color:#fff}
button.warn{background:var(--orange);border-color:var(--orange);color:#161616}
button.bad{background:var(--red);border-color:var(--red);color:#fff}
button.ghost{background:transparent}
button.smallbtn{font-size:13px;padding:7px 9px;border-radius:8px}
h1,h2,h3{margin:0 0 12px} p{line-height:1.45}.app{min-height:100vh}
.top{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:5}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;letter-spacing:-.02em}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;display:grid;place-items:center;font-weight:900}.brand small{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.layout{display:grid;grid-template-columns:255px 1fr;gap:18px;padding:18px;max-width:1240px;margin:0 auto}.side,.main,.card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius)}
.side{padding:14px;height:max-content;position:sticky;top:78px}.main{padding:18px;min-height:76vh}.nav button{display:block;width:100%;text-align:left;margin:6px 0}.nav button.active{background:var(--blue2);border-color:var(--blue);color:var(--blue);font-weight:700}
.input, .form input,.form textarea,.form select,.search,select.input,textarea.input{width:100%;padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text)}.form{display:grid;gap:12px;max-width:780px}.form textarea{min-height:110px}.help{font-size:13px;color:var(--muted)}.small{font-size:13px;color:var(--muted)}.tiny{font-size:11px;color:var(--muted)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{justify-content:space-between}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.two{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.stat{padding:14px;border:1px solid var(--line);border-radius:13px;background:var(--panel2)}.big{font-size:30px;font-weight:800;letter-spacing:-.02em}.label{color:var(--muted);font-size:13px;margin-top:3px}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px;color:var(--muted);white-space:nowrap}.deck{padding:16px;border:1px solid var(--line);border-radius:13px;margin:10px 0;background:var(--panel)}.deck:hover{border-color:var(--blue)}.deck h3{margin:0 0 6px}.section{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.study-card{max-width:740px;margin:22px auto;padding:32px;text-align:center;border:1px solid var(--line);border-radius:20px;background:var(--panel);box-shadow:var(--shadow);min-height:270px;display:flex;flex-direction:column;justify-content:center}.prompt{font-size:28px;line-height:1.35;white-space:pre-wrap}.answer{font-size:22px;color:var(--text);border-top:1px solid var(--line);padding-top:22px;margin-top:22px;white-space:pre-wrap}.ease{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:740px;margin:0 auto}.ease button{min-height:66px}.empty{text-align:center;padding:45px;color:var(--muted)}
.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}.table{width:100%;border-collapse:collapse;background:var(--panel)}.table th,.table td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted);font-weight:700;background:var(--panel2);position:sticky;top:0}.table tr:last-child td{border-bottom:0}
.progress{height:9px;background:var(--line);border-radius:999px;overflow:hidden}.bar{height:100%;background:var(--blue);border-radius:999px}.forecast-row{display:grid;grid-template-columns:75px 1fr 42px;gap:10px;align-items:center;margin:8px 0}.answer-row{display:grid;grid-template-columns:72px 1fr 42px;gap:10px;align-items:center;margin:8px 0}.swatch{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px}.s-again{background:var(--red)}.s-hard{background:var(--orange)}.s-good{background:var(--green)}.s-easy{background:var(--blue)}
.calendar-wrap{overflow:auto;padding-bottom:8px}.calendar{display:grid;grid-template-rows:repeat(7,13px);grid-auto-flow:column;grid-auto-columns:13px;gap:4px;margin-top:10px}.daycell{width:13px;height:13px;border-radius:3px;background:#e6e9ef;border:1px solid rgba(0,0,0,.04)}.dark .daycell{background:#273247}.lv1{background:#c7dbff}.lv2{background:#7fb0ff}.lv3{background:#3f7bd9}.lv4{background:#204f9c}.dark .lv1{background:#243f66}.dark .lv2{background:#2d609d}.dark .lv3{background:#4589d6}.dark .lv4{background:#84b6ff}.cal-legend{display:flex;gap:6px;align-items:center;justify-content:flex-end;margin-top:8px}.cal-months{display:grid;grid-template-columns:repeat(12,1fr);font-size:11px;color:var(--muted);min-width:870px}.calendar{min-width:870px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--text);color:var(--panel);padding:10px 14px;border-radius:999px;box-shadow:var(--shadow);z-index:20}.danger-zone{border-color:rgba(194,65,48,.45)}
@media(max-width:840px){.layout{display:block;padding:10px}.side{position:static;margin-bottom:10px}.top{padding:0 10px}.brand small{display:none}.main{padding:12px}.two{grid-template-columns:1fr}.ease{grid-template-columns:1fr 1fr}.prompt{font-size:23px}.answer{font-size:20px}.hide-mobile{display:none}.calendar,.cal-months{min-width:760px}.side .nav{display:grid;grid-template-columns:1fr 1fr;gap:6px}.nav button{margin:0}.top .small{display:none}}
</style>
</head>
<body><div id="app"></div><script>
const STORE='memoki-pwa-v2';
const OLD_STORE='flashmaster-pwa-v1';
const DAY=86400000;
const now=()=>Date.now();
const uid=()=>crypto.randomUUID ? crypto.randomUUID() : 'id-'+Math.random().toString(36).slice(2)+Date.now();
const dayKey=(ts=now())=>{const d=new Date(ts);d.setHours(0,0,0,0);return d.toISOString().slice(0,10)};
const addDays=(ts,days)=>{const d=new Date(ts);d.setDate(d.getDate()+days);return d.getTime()};
let reviewStartedAt=now();
const seed={
  dark:false,view:'decks',activeDeck:'japanese',showAnswer:false,query:'',toast:'',lastImportSummary:'',
  decks:[
    {id:'japanese',name:'Japanese Core',desc:'Vocabulary and recognition practice',created:now()},
    {id:'engineering',name:'Civil Engineering',desc:'Work and plan-review terms',created:now()}
  ],
  cards:[
    {id:'c1',deckId:'japanese',front:'投げ銭',back:'A tip or donation, especially online creator tipping.',tags:'japanese',due:now()-2000,interval:0,ease:2.5,reps:0,lapses:0,state:'new',created:now()-DAY*5,updated:now()-DAY*5},
    {id:'c2',deckId:'japanese',front:'ほっといてくれ',back:'Leave me alone. / Let me be.',tags:'japanese phrase',due:now()+DAY,interval:1,ease:2.5,reps:1,lapses:0,state:'review',created:now()-DAY*4,updated:now()-DAY},
    {id:'c3',deckId:'engineering',front:'ITS',back:'Intelligent Transportation Systems: signals, detection, communications, traffic operations technology.',tags:'traffic',due:now()-5000,interval:0,ease:2.5,reps:0,lapses:0,state:'new',created:now()-DAY*3,updated:now()-DAY*3}
  ],
  history:[]
};
let state=load();
function load(){
  try{
    const current=localStorage.getItem(STORE);
    if(current)return normalize(JSON.parse(current));
    const old=localStorage.getItem(OLD_STORE);
    if(old){const migrated=normalize(JSON.parse(old)); migrated.view='decks'; return migrated;}
  }catch(e){}
  return structuredClone ? structuredClone(seed) : JSON.parse(JSON.stringify(seed));
}
function normalize(s){
  s.dark=!!s.dark; s.view=s.view||'decks'; s.activeDeck=s.activeDeck||(s.decks&&s.decks[0]&&s.decks[0].id)||'default';
  s.decks=Array.isArray(s.decks)&&s.decks.length?s.decks:seed.decks;
  s.cards=Array.isArray(s.cards)?s.cards:[]; s.history=Array.isArray(s.history)?s.history:[];
  s.cards.forEach(c=>{c.id=c.id||uid();c.deckId=c.deckId||s.activeDeck;c.front=c.front||'';c.back=c.back||'';c.tags=c.tags||'';c.due=Number(c.due||now());c.interval=Number(c.interval||0);c.ease=Number(c.ease||2.5);c.reps=Number(c.reps||0);c.lapses=Number(c.lapses||0);c.state=c.state||'new';c.created=c.created||now();c.updated=c.updated||now();});
  return s;
}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}
function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function attr(s){return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function js(s){return JSON.stringify(String(s));}
function toast(msg){state.toast=msg;save();render();setTimeout(()=>{state.toast='';save();render();},1800)}
function set(p){Object.assign(state,p); if(p.view==='study'){state.showAnswer=false; reviewStartedAt=now();} save(); render();}
function currentDeck(){return state.decks.find(d=>d.id===state.activeDeck)||state.decks[0];}
function cardDeckName(c){return (state.decks.find(d=>d.id===c.deckId)||{}).name||'Unknown';}
function dueCards(deckId){return state.cards.filter(c=>(deckId==='all'||c.deckId===deckId)&&c.due<=now()).sort((a,b)=>a.due-b.due);}
function allCards(deckId){return state.cards.filter(c=>deckId==='all'||c.deckId===deckId);}
function deckStats(id){const cards=allCards(id);return{total:cards.length,due:cards.filter(c=>c.due<=now()).length,new:cards.filter(c=>c.state==='new').length,learn:cards.filter(c=>c.state==='learning').length,review:cards.filter(c=>c.state==='review').length};}
function historyIn(days){const min=now()-DAY*days;return state.history.filter(h=>h.ts>=min);}
function reviewsToday(){const today=dayKey();return state.history.filter(h=>h.day===today);}
function startStudy(deckId){state.activeDeck=deckId;state.view='study';state.showAnswer=false;reviewStartedAt=now();save();render();}
function currentCard(){return dueCards(state.activeDeck)[0];}
function review(rating){
  const c=currentCard(); if(!c)return;
  const seconds=Math.max(1,Math.round((now()-reviewStartedAt)/1000));
  c.reps++; c.updated=now();
  if(rating==='again'){c.lapses++;c.interval=0;c.state='learning';c.due=now()+10*60*1000;}
  if(rating==='hard'){c.interval=Math.max(1,Math.round((c.interval||1)*1.2));c.ease=Math.max(1.3,c.ease-.15);c.state='review';c.due=addDays(now(),c.interval);}
  if(rating==='good'){c.interval=c.interval?Math.max(1,Math.round(c.interval*c.ease)):1;c.state='review';c.due=addDays(now(),c.interval);}
  if(rating==='easy'){c.interval=c.interval?Math.max(4,Math.round(c.interval*(c.ease+.45))):4;c.ease=Math.min(3.5,c.ease+.15);c.state='review';c.due=addDays(now(),c.interval);}
  state.history.push({id:uid(),cardId:c.id,deckId:c.deckId,day:dayKey(),ts:now(),rating,seconds,intervalAfter:c.interval,stateAfter:c.state});
  state.showAnswer=false; reviewStartedAt=now(); save(); render();
}
function addDeck(){const name=prompt('Deck name'); if(!name)return; const id=uid(); state.decks.push({id,name:name.trim(),desc:'',created:now()}); state.activeDeck=id; save();render();}
function renameDeck(id){const d=state.decks.find(x=>x.id===id); if(!d)return; const name=prompt('Deck name',d.name); if(!name)return; d.name=name.trim(); save();render();}
function addCard(e){e.preventDefault(); const f=e.target; const deckId=f.deck.value; state.cards.unshift({id:uid(),deckId,front:f.front.value.trim(),back:f.back.value.trim(),tags:f.tags.value.trim(),due:now(),interval:0,ease:2.5,reps:0,lapses:0,state:'new',created:now(),updated:now()}); state.activeDeck=deckId; state.view='browse'; save(); render();}
function delCard(id){if(confirm('Delete this card?')){state.cards=state.cards.filter(c=>c.id!==id);state.history=state.history.filter(h=>h.cardId!==id);save();render();}}
function resetCard(id){const c=state.cards.find(x=>x.id===id); if(!c)return; c.due=now();c.interval=0;c.ease=2.5;c.reps=0;c.lapses=0;c.state='new';c.updated=now();save();render();}
function updateCard(id,field,value){const c=state.cards.find(x=>x.id===id); if(!c)return; c[field]=value; c.updated=now(); save();}
function exportBackup(){downloadText('memoki-backup.json',JSON.stringify({app:'Memoki',version:2,exportedAt:new Date().toISOString(),...state},null,2),'application/json');}
function exportTSV(){const rows=state.cards.map(c=>[c.front,c.back,cardDeckName(c),c.tags].map(v=>String(v||'').replace(/\t/g,' ').replace(/\n/g,'<br>')).join('\t')).join('\n'); downloadText('memoki-cards.tsv','Front\tBack\tDeck\tTags\n'+rows,'text/tab-separated-values');}
function downloadText(name,text,type){const blob=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function parseDelimitedLine(line,delim){
  const out=[]; let cur=''; let quoted=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){ if(quoted&&line[i+1]==='"'){cur+='"';i++;} else quoted=!quoted; }
    else if(ch===delim && !quoted){out.push(cur.trim());cur='';}
    else cur+=ch;
  }
  out.push(cur.trim()); return out;
}
function parseCardText(text, fallbackDeckId, newDeckName){
  const clean=text.replace(/\r/g,'').trim(); if(!clean)return [];
  const lines=clean.split('\n').filter(l=>l.trim() && !l.trim().startsWith('#'));
  let imported=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i]; const delim=line.includes('\t')?'\t':','; const cols=parseDelimitedLine(line,delim);
    if(i===0 && cols[0] && cols[1] && cols[0].toLowerCase().includes('front') && cols[1].toLowerCase().includes('back'))continue;
    if(cols.length<2 || !cols[0] || !cols[1])continue;
    const deckName=(cols[2]||newDeckName||'').trim(); let deckId=fallbackDeckId;
    if(deckName){ deckId=findOrCreateDeck(deckName); }
    imported.push({id:uid(),deckId,front:cols[0],back:cols[1],tags:cols[3]||'',due:now(),interval:0,ease:2.5,reps:0,lapses:0,state:'new',created:now(),updated:now()});
  }
  return imported;
}
function findOrCreateDeck(name){let d=state.decks.find(x=>x.name.toLowerCase()===name.toLowerCase()); if(d)return d.id; const id=uid(); state.decks.push({id,name,desc:'Imported deck',created:now()}); return id;}
function importCardsFromSettings(){
  const text=document.getElementById('importText')?.value||''; const deckId=document.getElementById('importDeck')?.value||state.activeDeck; const newDeckName=document.getElementById('newDeckName')?.value||'';
  const cards=parseCardText(text,deckId,newDeckName); if(!cards.length){alert('No cards found. Use one card per line: front<TAB>back');return;}
  state.cards.unshift(...cards); state.activeDeck=cards[0].deckId; state.lastImportSummary=`Imported ${cards.length} card${cards.length===1?'':'s'}.`; save(); render();
}
function importCardsFile(input){const file=input.files&&input.files[0]; if(!file)return; const r=new FileReader(); r.onload=()=>{const text=String(r.result||'');
  if(file.name.toLowerCase().endsWith('.json')){try{const obj=JSON.parse(text); const arr=Array.isArray(obj)?obj:(Array.isArray(obj.cards)?obj.cards:[]); if(!arr.length)throw new Error('No cards'); const deckId=document.getElementById('importDeck')?.value||state.activeDeck; const newDeckName=document.getElementById('newDeckName')?.value||''; const cards=arr.filter(x=>x.front&&x.back).map(x=>({id:uid(),deckId:x.deck?findOrCreateDeck(x.deck):x.deckName?findOrCreateDeck(x.deckName):(newDeckName?findOrCreateDeck(newDeckName):deckId),front:String(x.front),back:String(x.back),tags:String(x.tags||''),due:now(),interval:0,ease:2.5,reps:0,lapses:0,state:'new',created:now(),updated:now()})); state.cards.unshift(...cards); state.lastImportSummary=`Imported ${cards.length} card${cards.length===1?'':'s'} from JSON.`; save(); render(); return;}catch(e){alert('That JSON was not a card list. Use Restore Backup for a full Memoki backup.');return;}}
  document.getElementById('importText').value=text; toast('File loaded. Tap Import Cards.');}; r.readAsText(file);}
function restoreBackup(input){const file=input.files&&input.files[0]; if(!file)return; const r=new FileReader(); r.onload=()=>{try{const obj=normalize(JSON.parse(r.result)); if(!confirm('Replace all Memoki data with this backup?'))return; state=obj; state.view='decks'; state.lastImportSummary='Backup restored.'; save(); render();}catch(e){alert('Could not restore this backup.');}}; r.readAsText(file);}
function clearAll(){if(confirm('Delete all decks, cards, and statistics from this device?')){state=structuredClone?structuredClone(seed):JSON.parse(JSON.stringify(seed));save();render();}}
function render(){document.documentElement.className=state.dark?'dark':''; const active=currentDeck(); const app=document.getElementById('app'); app.innerHTML=`<div class="app"><div class="top"><div class="brand"><div class="logo">M</div><div>Memoki<small>Anki-style flashcards</small></div></div><div class="row"><span class="small">${esc(active?.name||'All Decks')}</span><button onclick="set({dark:!state.dark})">${state.dark?'Light':'Dark'}</button></div></div><div class="layout"><aside class="side"><label class="small">Current deck</label><select class="input" onchange="set({activeDeck:this.value,showAnswer:false})"><option value="all" ${state.activeDeck==='all'?'selected':''}>All Decks</option>${state.decks.map(d=>`<option value="${attr(d.id)}" ${d.id===state.activeDeck?'selected':''}>${esc(d.name)}</option>`).join('')}</select><div class="nav"><button class="${state.view==='decks'?'active':''}" onclick="set({view:'decks'})">Decks</button><button class="${state.view==='study'?'active':''}" onclick="set({view:'study'})">Study</button><button class="${state.view==='add'?'active':''}" onclick="set({view:'add'})">Add</button><button class="${state.view==='browse'?'active':''}" onclick="set({view:'browse'})">Browse</button><button class="${state.view==='stats'?'active':''}" onclick="set({view:'stats'})">Statistics</button><button class="${state.view==='settings'?'active':''}" onclick="set({view:'settings'})">Settings</button></div><p class="help">Keyboard: Space shows answer. 1 Again, 2 Hard, 3 Good, 4 Easy.</p></aside><main class="main">${view()}</main></div>${state.toast?`<div class="toast">${esc(state.toast)}</div>`:''}</div>`;}
function view(){
  if(state.view==='decks')return viewDecks();
  if(state.view==='study')return viewStudy();
  if(state.view==='add')return viewAdd();
  if(state.view==='browse')return viewBrowse();
  if(state.view==='stats')return viewStats();
  return viewSettings();
}
function viewDecks(){const all=deckStats('all'); return `<div class="row between"><h2>Decks</h2><button class="primary" onclick="addDeck()">New Deck</button></div><div class="grid"><div class="stat"><div class="big">${all.due}</div><div class="label">Due now</div></div><div class="stat"><div class="big">${all.new}</div><div class="label">New</div></div><div class="stat"><div class="big">${all.review}</div><div class="label">Review</div></div><div class="stat"><div class="big">${all.total}</div><div class="label">Total cards</div></div></div><div class="section">${state.decks.map(d=>{const s=deckStats(d.id);return `<div class="deck"><div class="row between"><div onclick="startStudy(${js(d.id)})" style="flex:1"><h3>${esc(d.name)}</h3><div class="small">${esc(d.desc||'No description')}</div></div><button class="smallbtn" onclick="renameDeck(${js(d.id)})">Rename</button></div><p><span class="pill">${s.due} due</span> <span class="pill">${s.new} new</span> <span class="pill">${s.learn} learning</span> <span class="pill">${s.review} review</span> <span class="pill">${s.total} total</span></p><button class="primary" onclick="startStudy(${js(d.id)})">Study</button></div>`}).join('')}</div>`;}
function viewStudy(){const c=currentCard(); const s=deckStats(state.activeDeck); if(!c)return `<div class="empty"><h2>No cards due</h2><p>${state.activeDeck==='all'?'All decks are caught up.':`${esc(currentDeck()?.name||'This deck')} is caught up.`}</p><div class="row" style="justify-content:center"><button class="primary" onclick="set({view:'add'})">Add Card</button><button onclick="set({view:'stats'})">View Statistics</button></div></div>`; return `<div class="row between"><h2>${state.activeDeck==='all'?'All Decks':esc(currentDeck()?.name||'Study')}</h2><div><span class="pill">${s.due} due</span> <span class="pill">${s.new} new</span> <span class="pill">${s.learn} learning</span></div></div><div class="study-card"><div class="tiny">${esc(cardDeckName(c))}</div><div class="prompt">${esc(c.front)}</div>${state.showAnswer?`<div class="answer">${esc(c.back)}</div>`:''}</div>${!state.showAnswer?`<p style="text-align:center"><button class="primary" onclick="set({showAnswer:true})">Show Answer</button></p>`:`<div class="ease"><button class="bad" onclick="review('again')">Again<br><small>10 min</small></button><button class="warn" onclick="review('hard')">Hard<br><small>${Math.max(1,Math.round((c.interval||1)*1.2))} day</small></button><button class="good" onclick="review('good')">Good<br><small>${c.interval?Math.max(1,Math.round(c.interval*c.ease)):1} day</small></button><button class="primary" onclick="review('easy')">Easy<br><small>${c.interval?Math.max(4,Math.round(c.interval*(c.ease+.45))):4} days</small></button></div>`}`;}
function viewAdd(){return `<h2>Add Card</h2><form class="form" onsubmit="addCard(event)"><label>Deck<select name="deck">${state.decks.map(d=>`<option value="${attr(d.id)}" ${d.id===state.activeDeck?'selected':''}>${esc(d.name)}</option>`).join('')}</select></label><label>Front<textarea name="front" required placeholder="Question, term, image note, or prompt"></textarea></label><label>Back<textarea name="back" required placeholder="Answer"></textarea></label><label>Tags<input name="tags" placeholder="optional tags"></label><button class="primary">Add Card</button></form>`;}
function viewBrowse(){const q=(state.query||'').toLowerCase(); const cards=state.cards.filter(c=>(state.activeDeck==='all'||c.deckId===state.activeDeck)&&(`${c.front} ${c.back} ${c.tags}`).toLowerCase().includes(q)); return `<div class="row between"><h2>Browse</h2><button onclick="set({view:'add'})">Add</button></div><input class="search" placeholder="Search front, back, or tags" value="${attr(state.query)}" oninput="state.query=this.value;save();render()"><p class="small">${cards.length} card${cards.length===1?'':'s'} shown.</p><div class="tablewrap"><table class="table"><thead><tr><th>Front</th><th>Back</th><th class="hide-mobile">Deck</th><th class="hide-mobile">State</th><th></th></tr></thead><tbody>${cards.map(c=>`<tr><td><textarea class="input" onblur="updateCard(${js(c.id)},'front',this.value)">${esc(c.front)}</textarea></td><td><textarea class="input" onblur="updateCard(${js(c.id)},'back',this.value)">${esc(c.back)}</textarea></td><td class="hide-mobile">${esc(cardDeckName(c))}</td><td class="hide-mobile"><span class="pill">${esc(c.state)}</span></td><td><button class="smallbtn" onclick="resetCard(${js(c.id)})">Reset</button><br><button class="smallbtn" onclick="delCard(${js(c.id)})">Delete</button></td></tr>`).join('')}</tbody></table></div>`;}
function viewStats(){
  const today=reviewsToday(); const all=deckStats('all'); const totalReviews=state.history.length; const minutesToday=Math.round(today.reduce((a,h)=>a+(h.seconds||0),0)/60); const studiedDays=new Set(state.history.map(h=>h.day)).size; const last30=historyIn(30);
  return `<h2>Statistics</h2><div class="grid"><div class="stat"><div class="big">${today.length}</div><div class="label">Reviews today</div></div><div class="stat"><div class="big">${minutesToday}</div><div class="label">Minutes today</div></div><div class="stat"><div class="big">${studiedDays}</div><div class="label">Studied days</div></div><div class="stat"><div class="big">${all.due}</div><div class="label">Due now</div></div></div><div class="two section"><div class="card" style="padding:14px"><h3>Card Counts</h3>${countRows(all)}</div><div class="card" style="padding:14px"><h3>Reviews</h3><div class="stat"><div class="big">${totalReviews}</div><div class="label">All-time reviews</div></div><br><div class="stat"><div class="big">${last30.length}</div><div class="label">Last 30 days</div></div></div></div><div class="two section"><div class="card" style="padding:14px"><h3>Answer Buttons</h3>${answerRows(last30)}</div><div class="card" style="padding:14px"><h3>Due Forecast</h3>${forecastRows()}</div></div><div class="section card" style="padding:14px"><div class="row between"><h3>Study Calendar</h3><span class="small">last 365 days</span></div>${calendarHeatmap()}</div>`;}
function countRows(s){const items=[['New',s.new],['Learning',s.learn],['Review',s.review],['Due',s.due],['Total',s.total]]; const max=Math.max(...items.map(x=>x[1]),1); return items.map(([name,val])=>`<div class="forecast-row"><div>${name}</div><div class="progress"><div class="bar" style="width:${Math.round(val/max*100)}%"></div></div><div>${val}</div></div>`).join('');}
function answerRows(hist){const counts={again:0,hard:0,good:0,easy:0}; hist.forEach(h=>counts[h.rating]=(counts[h.rating]||0)+1); const items=[['Again',counts.again,'s-again'],['Hard',counts.hard,'s-hard'],['Good',counts.good,'s-good'],['Easy',counts.easy,'s-easy']]; const max=Math.max(...items.map(x=>x[1]),1); return items.map(([name,val,cls])=>`<div class="answer-row"><div><span class="swatch ${cls}"></span>${name}</div><div class="progress"><div class="bar" style="width:${Math.round(val/max*100)}%"></div></div><div>${val}</div></div>`).join('')+`<p class="small">Shows the last 30 days, similar to Anki answer-button statistics.</p>`;}
function forecastRows(){const days=[]; for(let i=0;i<14;i++){const key=dayKey(addDays(now(),i)); const count=state.cards.filter(c=>dayKey(c.due)===key).length; days.push([i===0?'Today':`+${i}d`,count]);} const max=Math.max(...days.map(x=>x[1]),1); return days.map(([name,val])=>`<div class="forecast-row"><div>${name}</div><div class="progress"><div class="bar" style="width:${Math.round(val/max*100)}%"></div></div><div>${val}</div></div>`).join('');}
function calendarHeatmap(){const counts={}; state.history.forEach(h=>counts[h.day]=(counts[h.day]||0)+1); const start=addDays(now(),-364); let cells=''; for(let i=0;i<365;i++){const t=addDays(start,i); const key=dayKey(t); const n=counts[key]||0; const lv=n===0?'':n<3?'lv1':n<8?'lv2':n<15?'lv3':'lv4'; cells+=`<div class="daycell ${lv}" title="${key}: ${n} review${n===1?'':'s'}"></div>`;} return `<div class="calendar-wrap"><div class="cal-months"><span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span><span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span></div><div class="calendar">${cells}</div></div><div class="cal-legend"><span class="tiny">Less</span><span class="daycell"></span><span class="daycell lv1"></span><span class="daycell lv2"></span><span class="daycell lv3"></span><span class="daycell lv4"></span><span class="tiny">More</span></div>`;}
function viewSettings(){return `<h2>Settings</h2><div class="two"><div class="card" style="padding:14px"><h3>Import Cards</h3><p class="help">Use this instead of manually adding cards. Best format: one card per line with front and back separated by a tab. CSV also works.</p><label class="small">Import into deck</label><select id="importDeck" class="input">${state.decks.map(d=>`<option value="${attr(d.id)}" ${d.id===state.activeDeck?'selected':''}>${esc(d.name)}</option>`).join('')}</select><br><br><label class="small">Or create/use deck name from import</label><input id="newDeckName" class="input" placeholder="Example: Biology"><br><br><label class="small">Upload CSV, TSV, TXT, or JSON card list</label><input class="input" type="file" accept=".csv,.tsv,.txt,.json" onchange="importCardsFile(this)"><br><br><label class="small">Paste cards here</label><textarea id="importText" class="input" style="min-height:150px" placeholder="Capital of Japan&#9;Tokyo\n投げ銭&#9;Tip / donation"></textarea><br><br><button class="primary" onclick="importCardsFromSettings()">Import Cards</button>${state.lastImportSummary?`<p class="small">${esc(state.lastImportSummary)}</p>`:''}<div class="section"><h3>Accepted formats</h3><p class="help">TSV: <b>front TAB back</b>. Optional columns: deck and tags.</p><p class="help">CSV: <b>front,back,deck,tags</b>. Quoted CSV fields are supported.</p><p class="help">JSON: array of objects with <b>front</b> and <b>back</b>.</p></div></div><div class="card" style="padding:14px"><h3>Backup / Data</h3><p class="help">Memoki stores cards on this device in Safari/browser storage. Export backups before clearing browser data.</p><button onclick="exportBackup()">Export Backup JSON</button> <button onclick="exportTSV()">Export Cards TSV</button><div class="section"><label class="small">Restore full backup</label><input class="input" type="file" accept=".json" onchange="restoreBackup(this)"></div><div class="section"><h3>Appearance</h3><button onclick="set({dark:!state.dark})">Switch to ${state.dark?'Light':'Dark'} Mode</button></div><div class="section danger-zone stat"><h3>Danger Zone</h3><button class="bad" onclick="clearAll()">Reset App Data</button></div></div></div>`;}
window.addEventListener('keydown',e=>{if(state.view!=='study')return; if(e.code==='Space'){e.preventDefault(); if(!state.showAnswer)set({showAnswer:true});} if(state.showAnswer&&['Digit1','Digit2','Digit3','Digit4'].includes(e.code)){review(['again','hard','good','easy'][Number(e.code.slice(-1))-1]);}});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));}
render();
</script></body>
</html>
